name: Build debug

# 防止重复构建：同一分支/PR的新提交会取消旧的进行中的构建
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Fetch full history for Shijima submodules
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          git fetch --unshallow origin $BRANCH_NAME || true
          pushd libshijima
          git fetch --unshallow origin main || true
          echo "libshijima: $(git rev-list HEAD --count) commits"
          popd
      - name: Cache Docker image
        id: cache-docker
        uses: actions/cache@v4
        with:
          path: shijima-qt-dev.tar.gz
          key: docker-fedora-42-qt6-mingw-v2-${{ hashFiles('dev-docker/Dockerfile') }}
      - name: Build Docker image
        if: steps.cache-docker.outputs.cache-hit != 'true'
        run: |
          pushd dev-docker
          docker build -t shijima-qt-dev .
          docker save shijima-qt-dev | gzip > ../shijima-qt-dev.tar.gz
          popd
      - name: Import Docker image
        if: steps.cache-docker.outputs.cache-hit == 'true'
        run: |
          gunzip -c < shijima-qt-dev.tar.gz | docker load
      - name: Patch ElaWidgetTools for Qt 6.8 compatibility
        run: |
          # Remove the Qt version upper bound check in ElaWidgetTools
          # This allows building with Qt 6.8+ in the Docker environment
          sed -i 's/if (${QT_VERSION} VERSION_GREATER 6.7.0 OR ${QT_VERSION} VERSION_LESS 5.12.0)/if (${QT_VERSION} VERSION_LESS 5.12.0)/' ElaWidgetTools/CMakeLists.txt
          # Change FATAL_ERROR to WARNING for the intermediate Qt versions
          sed -i 's/message(FATAL_ERROR "你当前使用的QT版本为不推荐版本/message(WARNING "你当前使用的QT版本为不推荐版本/' ElaWidgetTools/CMakeLists.txt
      - name: Build Windows x86_64 debug build
        run: |
          docker run -e CONFIG=debug --rm -v "$(pwd)":/work shijima-qt-dev bash -c \
            'mingw64-make clean && mingw64-make -j2'
      - name: Archive Windows x86_64 debug build
        uses: actions/upload-artifact@v4
        with:
          name: debug-windows-x86_64
          path: publish/Windows/debug/shijima-qt.exe
          retention-days: 1
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Fetch full history for Shijima submodules
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          git fetch --unshallow origin $BRANCH_NAME || true
          pushd libshijima
          git fetch --unshallow origin main || true
          echo "libshijima: $(git rev-list HEAD --count) commits"
          popd
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Qt6
        uses: jdpurcell/install-qt-action@v5
        with:
          # Note: use-naqt removed because naqt doesn't support qttools module
          version: '6.8.2'
          host: linux
          target: 'desktop'
          arch: linux_gcc_64
          modules: 'qtmultimedia'
          cache: true
      - name: Install Qt6 sources (private headers)
        run: |
          QT_DIR="${{ runner.workspace }}/Qt/6.8.2/gcc_64"
          mkdir -p $QT_DIR/include/QtWidgets/private
          mkdir -p $QT_DIR/include/QtGui/private
          mkdir -p $QT_DIR/include/QtCore/private
          cd /tmp
          echo "Downloading Qt 6.8.2 source code..."
          wget -q --timeout=120 https://download.qt.io/archive/qt/6.8/6.8.2/submodules/qtbase-everywhere-src-6.8.2.tar.xz
          echo "Source downloaded, extracting private headers..."
          tar -xf qtbase-everywhere-src-6.8.2.tar.xz
          echo "Copying private headers (QtWidgets, QtGui, QtCore)..."
          find qtbase-everywhere-src-6.8.2/src/widgets -name '*_p.h' -exec cp {} $QT_DIR/include/QtWidgets/private/ \; 2>/dev/null || true
          find qtbase-everywhere-src-6.8.2/src/gui -name '*_p.h' -exec cp {} $QT_DIR/include/QtGui/private/ \; 2>/dev/null || true
          find qtbase-everywhere-src-6.8.2/src/corelib -name '*_p.h' -exec cp {} $QT_DIR/include/QtCore/private/ \; 2>/dev/null || true
          echo "Private headers installed:"
          echo "  QtWidgets/private: $(ls $QT_DIR/include/QtWidgets/private/ | wc -l) files"
          echo "  QtGui/private: $(ls $QT_DIR/include/QtGui/private/ | wc -l) files"
          echo "  QtCore/private: $(ls $QT_DIR/include/QtCore/private/ | wc -l) files"
          rm -rf qtbase-everywhere-src-6.8.2 qtbase-everywhere-src-6.8.2.tar.xz
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libarchive-dev libwayland-dev wayland-protocols ccache
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: linux-qt6
          max-size: 500M
      - name: Debug Qt installation
        env:
          QT_DIR: ${{ runner.workspace }}/Qt/6.8.2/gcc_64
        run: |
          echo "=== Qt Directory Structure ==="
          ls -la $QT_DIR/ || echo "QT_DIR not found"
          echo ""
          echo "=== Qt Bin Directory ==="
          ls -la $QT_DIR/bin/ 2>/dev/null || echo "bin directory not found"
          echo ""
          echo "=== Looking for moc ==="
          find $QT_DIR -name "moc" 2>/dev/null || echo "moc not found in QT_DIR"
          which moc || echo "moc not in PATH"
      - name: Prepare build environment
        env:
          QT_DIR: ${{ runner.workspace }}/Qt/6.8.2/gcc_64
        run: |
          export PATH="/usr/lib/ccache:$QT_DIR/bin:$QT_DIR/libexec:$PATH"
          export PKG_CONFIG_PATH="$QT_DIR/lib/pkgconfig:$PKG_CONFIG_PATH"
          export Qt6_DIR="$QT_DIR/lib/cmake/Qt6"
          export MOC="$QT_DIR/libexec/moc"
          export RCC="$QT_DIR/libexec/rcc"
          export LRELEASE="$QT_DIR/bin/lrelease"
          export CXXFLAGS="$CXXFLAGS -I$QT_DIR/include/QtCore/6.8.2 -I$QT_DIR/include/QtCore/6.8.2/QtCore -I$QT_DIR/include/QtWidgets/6.8.2 -I$QT_DIR/include/QtWidgets/6.8.2/QtWidgets -I/usr/include/x86_64-linux-gnu/qt6/QtCore/6.8.2 -I/usr/include/x86_64-linux-gnu/qt6/QtWidgets/6.8.2"
          echo "ccache stats before:"
          ccache -s
          make licenses_generated.hpp
          cp licenses_generated.hpp include/
          echo "Environment prepared"
      - name: Build Platform library
        env:
          QT_DIR: ${{ runner.workspace }}/Qt/6.8.2/gcc_64
        run: |
          export PATH="/usr/lib/ccache:$QT_DIR/bin:$QT_DIR/libexec:$PATH"
          export PKG_CONFIG_PATH="$QT_DIR/lib/pkgconfig:$PKG_CONFIG_PATH"
          export Qt6_DIR="$QT_DIR/lib/cmake/Qt6"
          export MOC="$QT_DIR/libexec/moc"
          export RCC="$QT_DIR/libexec/rcc"
          export LRELEASE="$QT_DIR/bin/lrelease"
          export CXXFLAGS="$CXXFLAGS -I$QT_DIR/include/QtCore/6.8.2 -I$QT_DIR/include/QtCore/6.8.2/QtCore -I$QT_DIR/include/QtWidgets/6.8.2 -I$QT_DIR/include/QtWidgets/6.8.2/QtWidgets -I/usr/include/x86_64-linux-gnu/qt6/QtCore/6.8.2 -I/usr/include/x86_64-linux-gnu/qt6/QtWidgets/6.8.2"
          echo "::group::Building Platform library"
          time make -j4 src/platform/Platform/Platform.a
          echo "::endgroup::"
      - name: Build libshijima
        env:
          QT_DIR: ${{ runner.workspace }}/Qt/6.8.2/gcc_64
        run: |
          export PATH="/usr/lib/ccache:$QT_DIR/bin:$QT_DIR/libexec:$PATH"
          export PKG_CONFIG_PATH="$QT_DIR/lib/pkgconfig:$PKG_CONFIG_PATH"
          export Qt6_DIR="$QT_DIR/lib/cmake/Qt6"
          export MOC="$QT_DIR/libexec/moc"
          export RCC="$QT_DIR/libexec/rcc"
          export LRELEASE="$QT_DIR/bin/lrelease"
          export CXXFLAGS="$CXXFLAGS -I$QT_DIR/include/QtCore/6.8.2 -I$QT_DIR/include/QtCore/6.8.2/QtCore -I$QT_DIR/include/QtWidgets/6.8.2 -I$QT_DIR/include/QtWidgets/6.8.2/QtWidgets -I/usr/include/x86_64-linux-gnu/qt6/QtCore/6.8.2 -I/usr/include/x86_64-linux-gnu/qt6/QtWidgets/6.8.2"
          echo "::group::Building libshijima"
          time make -j4 libshijima/build/libshijima.a
          echo "::endgroup::"
      - name: Build libshimejifinder
        env:
          QT_DIR: ${{ runner.workspace }}/Qt/6.8.2/gcc_64
        run: |
          export PATH="/usr/lib/ccache:$QT_DIR/bin:$QT_DIR/libexec:$PATH"
          export PKG_CONFIG_PATH="$QT_DIR/lib/pkgconfig:$PKG_CONFIG_PATH"
          export Qt6_DIR="$QT_DIR/lib/cmake/Qt6"
          export MOC="$QT_DIR/libexec/moc"
          export RCC="$QT_DIR/libexec/rcc"
          export LRELEASE="$QT_DIR/bin/lrelease"
          export CXXFLAGS="$CXXFLAGS -I$QT_DIR/include/QtCore/6.8.2 -I$QT_DIR/include/QtCore/6.8.2/QtCore -I$QT_DIR/include/QtWidgets/6.8.2 -I$QT_DIR/include/QtWidgets/6.8.2/QtWidgets -I/usr/include/x86_64-linux-gnu/qt6/QtCore/6.8.2 -I/usr/include/x86_64-linux-gnu/qt6/QtWidgets/6.8.2"
          echo "::group::Building libshimejifinder"
          time make -j4 libshimejifinder/build/libshimejifinder.a
          echo "::endgroup::"
      - name: Build ElaWidgetTools
        timeout-minutes: 30
        env:
          QT_DIR: ${{ runner.workspace }}/Qt/6.8.2/gcc_64
        run: |
          export PATH="/usr/lib/ccache:$QT_DIR/bin:$QT_DIR/libexec:$PATH"
          export PKG_CONFIG_PATH="$QT_DIR/lib/pkgconfig:$PKG_CONFIG_PATH"
          export Qt6_DIR="$QT_DIR/lib/cmake/Qt6"
          export MOC="$QT_DIR/libexec/moc"
          export RCC="$QT_DIR/libexec/rcc"
          export LRELEASE="$QT_DIR/bin/lrelease"
          echo "::group::Building ElaWidgetTools"
          rm -rf ElaWidgetTools/build
          time make -j2 ElaWidgetTools/build/ElaWidgetTools/libElaWidgetTools.a
          echo "::endgroup::"
      - name: Build main application
        timeout-minutes: 30
        env:
          QT_DIR: ${{ runner.workspace }}/Qt/6.8.2/gcc_64
        run: |
          export PATH="/usr/lib/ccache:$QT_DIR/bin:$QT_DIR/libexec:$PATH"
          export PKG_CONFIG_PATH="$QT_DIR/lib/pkgconfig:$PKG_CONFIG_PATH"
          export Qt6_DIR="$QT_DIR/lib/cmake/Qt6"
          export MOC="$QT_DIR/libexec/moc"
          export RCC="$QT_DIR/libexec/rcc"
          export LRELEASE="$QT_DIR/bin/lrelease"
          export CXXFLAGS="$CXXFLAGS -I$QT_DIR/include/QtCore/6.8.2 -I$QT_DIR/include/QtCore/6.8.2/QtCore -I$QT_DIR/include/QtWidgets/6.8.2 -I$QT_DIR/include/QtWidgets/6.8.2/QtWidgets"
          echo "::group::Building main application"
          # Use -j2 instead of -j4 to avoid resource exhaustion
          time make -j2 shijima-qt
          echo "::endgroup::"
          echo ""
          echo "ccache stats after build:"
          ccache -s
      - name: Archive Linux debug build
        uses: actions/upload-artifact@v4
        with:
          name: debug-linux-x86_64
          path: |
            publish/Linux/debug/shijima-qt
            publish/Linux/debug/libunarr.so.1
          retention-days: 1