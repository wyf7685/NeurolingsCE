name: Build release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.platform.host }}
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - runner: ubuntu-22.04
            host: linux
            qt_arch: linux_gcc_64
            qt_install_name: gcc_64
            build_target: appimage
            artifact_name: linux-x86_64
            artifact_path: build/NeurolingsCE.AppImage

          - runner: ubuntu-24.04-arm
            host: linux_arm64
            qt_arch: linux_gcc_arm64
            qt_install_name: gcc_arm64
            build_target: appimage
            artifact_name: linux-arm64
            artifact_path: build/NeurolingsCE.AppImage

          - runner: windows-latest
            host: windows
            qt_arch: win64_mingw
            qt_tools: tools_mingw1310
            qt_install_name: mingw_64
            artifact_name: windows-x86_64
            artifact_path: build/bin/

          # TODO: macos build

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install build dependencies
        if: matrix.platform.host == 'linux' || matrix.platform.host == 'linux_arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-cursor0 libarchive-dev libwayland-dev wayland-protocols ccache zip

      - name: Install build dependencies (arm64)
        if: matrix.platform.host == 'linux_arm64'
        run: |
          sudo apt-get install -y libgstreamer-plugins-bad1.0-0 libgstreamer-plugins-good1.0-0

      - name: Install Qt6
        uses: jdpurcell/install-qt-action@v5
        with:
          version: "6.8.2"
          host: ${{ matrix.platform.host }}
          target: "desktop"
          arch: ${{ matrix.platform.qt_arch }}
          modules: "qtmultimedia"
          tools: ${{ matrix.platform.qt_tools || '' }}
          cache: true

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ matrix.platform.host }}-qt6-release
          max-size: 800M

      - name: Build with CMake
        shell: bash
        run: |
          cmake -S . -B build -G Ninja \
            -D CMAKE_BUILD_TYPE=Release \
            -D CMAKE_PREFIX_PATH="${{ runner.workspace }}/Qt/6.8.2/${{ matrix.platform.qt_install_name }}" \
            -D CMAKE_C_COMPILER_LAUNCHER=ccache \
            -D CMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -D SHIJIMA_WITH_LIBSHIMEJIFINDER=ON
          cmake --build build -j 4 --target ${{ matrix.platform.build_target || 'all' }}

      - name: Archive ${{ matrix.platform.artifact_name }} release build
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform.artifact_name }}
          path: ${{ matrix.platform.artifact_path }}
          retention-days: 1

  build-macos:
    runs-on: macos-14
    if: false
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
      - name: Fetch full history for Shijima submodules
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          git fetch --unshallow origin $BRANCH_NAME || true
          pushd libshijima
          git fetch --unshallow origin main || true
          echo "libshijima: $(git rev-list HEAD --count) commits"
          popd
      - name: Temporarily let gtar run as root
        run: |
          sudo chown 0:0 /opt/homebrew/bin/gtar
          sudo chmod u+s /opt/homebrew/bin/gtar
      - name: Cache Qt6
        id: cache-qt6
        uses: actions/cache@v4
        with:
          path: /opt/local
          key: macos-14-macports-qt6
      - name: Revoke gtar's root permissions
        run: |
          sudo chmod u-s /opt/homebrew/bin/gtar
      - name: Install Qt6
        if: steps.cache-qt6.outputs.cache-hit != 'true'
        run: |
          wget --no-verbose https://github.com/macports/macports-base/releases/download/v2.10.5/MacPorts-2.10.5-14-Sonoma.pkg
          sudo installer -pkg MacPorts-2.10.5-14-Sonoma.pkg -target /
          export PATH=/opt/local/bin:/opt/local/sbin:$PATH
          yes | sudo port install qt6-qtbase qt6-qtmultimedia pkgconfig libarchive
          sudo rm -rf /opt/local/var/macports/build/*
          sudo rm -rf /opt/local/var/macports/distfiles/*
      - name: Expose MacPorts tools
        run: |
          echo "PATH=/opt/local/bin:/opt/local/sbin:$PATH" >> $GITHUB_ENV
      - name: Build macOS arm64 release build
        env:
          CONFIG: release
        run: |
          make clean
          make -j6
          make macapp
          cp -r licenses publish/macOS/release/
      - name: Archive macOS arm64 release build
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-arm64
          path: publish/macOS/release
          retention-days: 1
